<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Client Sign In - College Bus Tracker</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="client-portal.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="header">
        <header class="site-header">
            <div class="container header-inner">
                <h1><a class="logo" href="index.html">College Bus Tracker</a></h1>
                <input id="navToggle" class="nav-toggle" type="checkbox" aria-hidden="true">
                <label for="navToggle" class="menu-toggle" aria-label="Toggle menu"></label>
                <nav class="main-nav">
                    <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="booking.html">Booking</a></li>
                    <li><a href="./help.html">Help</a></li>
                    <li><a href="live.html">Live Tracking</a></li>
                    <li id="clientDashboardItem"><a href="client-signin.html">Login</a></li>
                    <li id="clientLogoutItem"></li>
                    </ul>
                </nav>
            </div>
        </header>
    </div>

  <main class="container">
    <section class="auth-section">
      <div class="auth-card">
        <h2>Sign In to Client Portal</h2>
        <p class="auth-subtitle">Access your bookings, complaints, and more</p>
        
        <form id="signinForm" class="auth-form">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="Enter your email">
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Enter your password">
          </div>

          <div class="form-error" id="formError"></div>

          <button type="submit" class="btn-primary btn-full">Sign In</button>
        </form>

        <p class="auth-switch">Don't have an account? <a href="client-signup.html">Sign Up</a></p>
      </div>
    </section>
  </main>

  <div id="footer">
    <footer class="site-footer">
        <div class="container footer-inner">
            <p>© 2026 College Bus Tracker. All rights reserved.</p>
        </div>
    </footer>
  </div>
  <script src="client-nav.js"></script>
  <script src="client-auth.js"></script>
</body>
</html>
