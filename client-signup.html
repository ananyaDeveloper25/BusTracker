<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Client Sign Up - College Bus Tracker</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="client-portal.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="header">
        <header class="site-header">
            <div class="container header-inner">
                <h1><a class="logo" href="index.html">College Bus Tracker</a></h1>
                <input id="navToggle" class="nav-toggle" type="checkbox" aria-hidden="true">
                <label for="navToggle" class="menu-toggle" aria-label="Toggle menu"></label>
                <nav class="main-nav">
                    <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="booking.html">Booking</a></li>
                    <li><a href="./help.html">Help</a></li>
                    <li><a href="live.html">Live Tracking</a></li>
                    <li id="clientDashboardItem"><a href="client-signin.html">Login</a></li>
                    <li id="clientLogoutItem"></li>
                    </ul>
                </nav>
            </div>
        </header>
    </div>

  <main class="container">
    <section class="auth-section">
      <div class="auth-card">
        <h2>Create Client Account</h2>
        <p class="auth-subtitle">Register to access your bookings, complaints, and more</p>
        
        <form id="signupForm" class="auth-form">
          <div class="form-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" name="fullName" required placeholder="Enter your full name">
          </div>

          <div class="form-group">
            <label for="rollNumber">Roll Number</label>
            <input type="text" id="rollNumber" name="rollNumber" required placeholder="Enter your roll number">
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="Enter your email">
          </div>

          <div class="form-group">
            <label for="contact">Contact Number</label>
            <input type="tel" id="contact" name="contact" required placeholder="Enter your contact number">
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Create a password" minlength="6">
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Confirm your password">
          </div>

          <div class="form-group">
            <label for="degreeName">Degree</label>
            <select id="degreeName" name="degreeName" required>
              <option value="">Select Degree</option>
              <option value="BE">BE (Bachelor of Engineering)</option>
              <option value="B.Tech">B.Tech (Bachelor of Technology)</option>
              <option value="MBBS">MBBS (Bachelor of Medicine)</option>
              <option value="B.Sc">B.Sc (Bachelor of Science)</option>
              <option value="B.Com">B.Com (Bachelor of Commerce)</option>
              <option value="BA">BA (Bachelor of Arts)</option>
              <option value="MBA">MBA (Master of Business Administration)</option>
              <option value="M.Tech">M.Tech (Master of Technology)</option>
              <option value="M.Sc">M.Sc (Master of Science)</option>
              <option value="Other">Other</option>
            </select>
            <input type="text" id="degreeOther" name="degreeOther" placeholder="Enter your degree" style="display:none; margin-top:0.5rem;" />
          </div>

          <div class="form-group">
            <label for="specialization">Specialization</label>
            <select id="specialization" name="specialization" required>
              <option value="">Select Specialization</option>
              <option value="CSE">CSE (Computer Science)</option>
              <option value="AI">AI (Artificial Intelligence)</option>
              <option value="DS">DS (Data Science)</option>
              <option value="IT">IT (Information Technology)</option>
              <option value="ECE">ECE (Electronics & Communication)</option>
              <option value="ME">ME (Mechanical Engineering)</option>
              <option value="CE">CE (Civil Engineering)</option>
              <option value="EE">EE (Electrical Engineering)</option>
              <option value="Medical">Medical</option>
              <option value="Commerce">Commerce</option>
              <option value="Arts">Arts</option>
              <option value="Other">Other</option>
            </select>
            <input type="text" id="specializationOther" name="specializationOther" placeholder="Enter your specialization" style="display:none; margin-top:0.5rem;" />
          </div>

          <div class="form-group">
            <label for="address">Address / Area</label>
            <input type="text" id="address" name="address" placeholder="e.g., Sector 22, Chandigarh">
          </div>

          <div class="form-group">
            <label for="yearStart">Start Year</label>
            <input type="number" id="yearStart" name="yearStart" required placeholder="e.g., 2022" min="2000" max="2035">
          </div>

          <div class="form-group">
            <label for="yearEnd">End Year (Graduation Year)</label>
            <input type="number" id="yearEnd" name="yearEnd" required placeholder="e.g., 2026" min="2000" max="2040">
          </div>

          <div class="form-error" id="formError"></div>

          <button type="submit" class="btn-primary btn-full">Create Account</button>
        </form>

        <p class="auth-switch">Already have an account? <a href="client-signin.html">Sign In</a></p>
      </div>
    </section>
  </main>

  <div id="footer">
    <footer class="site-footer">
        <div class="container footer-inner">
            <p>© 2026 College Bus Tracker. All rights reserved.</p>
        </div>
    </footer>
  </div>
  <script src="client-nav.js"></script>
  <script src="client-auth.js"></script>
</body>
</html>
